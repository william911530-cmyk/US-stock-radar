name: US Stock Radar Auto Update

on:
  schedule:
    # 🇺🇸 美東時間週一到週五 16:00 收盤，大約是台灣時間清晨 04:00 執行
    - cron: '0 20 * * 1-5'
  workflow_dispatch: # 保留手動按鈕，讓你想點就能隨時點

jobs:
  run-radar:
    runs-on: ubuntu-latest

    steps:
      - name: 1. 複製專案代碼到虛擬機
        uses: actions/checkout@v4

      - name: 2. 初始化 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. 依照清單安裝量化工具 (含 lxml)
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: 4. 啟動美股雷達大數據運算
        run: python radar_us.py

      - name: 5. 實體打包並安全推播回大廳
        run: |
          git config user.name "WallStreet-Bot"
          git config user.email "bot@wallstreet.com"
          
          # 先打包新生成的 JSON 檔案
          git add top20_us.json
          git commit -m "📊 Fix: WallStreet Data Stream Sync" || echo "資料無變動"
          
          # 桌子乾淨了，再拉取同步，徹底防衝突
          git pull --rebase origin main
          git push origin HEAD:main
