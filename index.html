<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUANTUM US // TOTAL MARKET TERMINAL</title>
    <style>
        :root {
            --bg-main: #050811; --bg-panel: #0d1222; --bg-input: #12182e;
            --border-color: #1e2942; --text-primary: #ffffff; --text-muted: #64748b;
            --neon-blue: #00f0ff; --trade-green: #00e676; --trade-red: #ff1744;
            --accent-purple: #9d4edd; --btn-hover: rgba(0, 240, 255, 0.15);
        }

        body {
            background-color: var(--bg-main); color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0; padding: 20px; font-size: 13px; letter-spacing: 0.5px;
        }

        .terminal-header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 2px solid var(--border-color); padding-bottom: 12px; margin-bottom: 20px;
        }
        .terminal-logo h1 { margin: 0; font-size: 18px; font-weight: 800; letter-spacing: 2px; }
        .terminal-logo h1 span { color: var(--neon-blue); }
        .sys-status {
            font-family: monospace; font-size: 11px; color: var(--trade-green);
            background: rgba(0, 230, 118, 0.08); padding: 4px 8px;
            border: 1px solid rgba(0, 230, 118, 0.3); border-radius: 2px; margin-top: 5px;
            display: inline-block;
        }

        .refresh-btn {
            background: transparent; color: var(--neon-blue); border: 1px solid var(--neon-blue);
            padding: 8px 16px; font-family: monospace; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .refresh-btn:hover { background: var(--btn-hover); box-shadow: 0 0 10px rgba(0, 240, 255, 0.3); }

        .terminal-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 20px; }
        .panel {
            background-color: var(--bg-panel); border: 1px solid var(--border-color);
            border-radius: 4px; padding: 18px; display: flex; flex-direction: column;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }
        .panel-left { grid-row: span 3; min-height: 750px; }
        .panel-title {
            font-size: 12px; font-weight: 700; color: var(--neon-blue); text-transform: uppercase;
            margin-top: 0; margin-bottom: 15px; letter-spacing: 1.5px; 
            border-left: 3px solid var(--neon-blue); padding-left: 8px;
            display: flex; justify-content: space-between;
        }
        .panel-title span { font-size: 11px; color: var(--text-muted); font-family: monospace; }

        table { width: 100%; border-collapse: collapse; font-family: monospace; }
        th { color: var(--text-muted); font-size: 11px; padding: 10px 8px; border-bottom: 1px solid var(--border-color); text-transform: uppercase; text-align: left; }
        td { padding: 12px 8px; border-bottom: 1px solid #141b2d; }
        .ticker-cell { color: var(--neon-blue); font-weight: bold; font-size: 14px; }
        .score-cell { font-weight: bold; background: rgba(255,255,255,0.05); text-align: center; color: var(--neon-blue); }

        /* 強化版搜尋框與按鈕 */
        .search-box { display: flex; gap: 8px; margin-bottom: 15px; }
        input, select {
            background-color: var(--bg-input); color: var(--text-primary);
            border: 1px solid var(--border-color); padding: 8px 12px; font-family: monospace; flex-grow: 1; outline: none;
        }
        input:focus, select:focus { border-color: var(--neon-blue); }
        .action-btn {
            background-color: var(--neon-blue); color: var(--bg-main); border: none;
            padding: 0 15px; font-weight: bold; font-size: 12px; cursor: pointer; text-transform: uppercase;
            font-family: monospace; transition: 0.2s; white-space: nowrap;
        }
        .action-btn:hover { background-color: #fff; }

        /* 觀測艙樣式 */
        .obs-display { background: #050811; border: 1px dashed var(--accent-purple); border-radius: 2px; padding: 15px; font-family: monospace; min-height: 90px; }
        .results-scroll { height: 160px; overflow-y: auto; border: 1px solid #141b2d; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 8px; border-bottom: 1px solid #141b2d; font-family: monospace; transition: 0.2s; }
        .list-item:hover { background: rgba(255,255,255,0.02); }
        
        .watchlist-container { height: 250px; overflow-y: auto; padding-right: 5px; }
        .group-header { background: #0e1527; padding: 8px 12px; margin-top: 15px; border-left: 2px solid var(--neon-blue); display: flex; justify-content: space-between; align-items: center; font-family: monospace; font-weight: bold; border-top: 1px solid #1e2942; }
        .del-btn { background: transparent; color: var(--trade-red); border: 1px solid var(--trade-red); font-size: 10px; cursor: pointer; padding: 3px 8px; }
        .del-btn:hover { background: var(--trade-red); color: #fff; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #1e2942; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--neon-blue); }
    </style>
</head>
<body>

<div class="terminal-header">
    <div class="terminal-logo">
        <h1>QUANTUM<span>//TERMINAL_US</span></h1>
        <div class="sys-status" id="sysStatus">SYS_STATUS: CONNECTING TO CLOUD...</div>
    </div>
    <button class="refresh-btn" onclick="loadTerminalData()">⟳ 強制刷新數據 (RELOAD)</button>
</div>

<div class="terminal-grid">
    
    <div class="panel panel-left">
        <h3 class="panel-title">全市場最強動能矩陣 (TOP 20) <span>top20_us.json</span></h3>
        <div style="overflow-y:auto; flex-grow:1;">
            <table>
                <thead>
                    <tr>
                        <th>代號 (Ticker)</th>
                        <th>公司名稱 (Name)</th>
                        <th>現價 (Price)</th>
                        <th>10日動能 (Vel)</th>
                        <th style="text-align: center;">綜合量化分數</th>
                    </tr>
                </thead>
                <tbody id="usRadarBody"></tbody>
            </table>
        </div>
    </div>

    <div class="panel" style="border: 1px solid var(--accent-purple);">
        <h3 class="panel-title" style="color: var(--accent-purple); border-left-color: var(--accent-purple);">
            ★ 單股深度解析艙 (全市場) <span>all_calculated_us.json</span>
        </h3>
        <div class="search-box">
            <input type="text" id="obsSearchInput" placeholder="輸入美股代號 (例: TSLA)" onkeydown="if(event.key==='Enter') filterObsDropdown()">
            <button class="action-btn" style="background:var(--accent-purple); color:#fff;" onclick="filterObsDropdown()">搜尋</button>
            <select id="obsDropdown" onchange="inspectTargetStock()" style="max-width: 140px;">
                <option value="">-- 點此選擇結果 --</option>
            </select>
        </div>
        <div class="obs-display" id="obsDisplayGrid">
            <div style="color: var(--text-muted); text-align: center; padding-top: 15px;">請在上方輸入代號並點擊搜尋</div>
        </div>
    </div>

    <div class="panel">
        <h3 class="panel-title">市場全量名單檢索 (加自選) <span>all_stocks.json</span></h3>
        <div class="search-box">
            <input type="text" id="usSearchInput" placeholder="輸入關鍵字尋找股票..." onkeydown="if(event.key==='Enter') searchUSStocks()">
            <button class="action-btn" onclick="searchUSStocks()">尋找</button>
            <select id="watchlistSelect" style="max-width: 130px;"></select>
        </div>
        <div id="usSearchResults" class="results-scroll"></div>
    </div>

    <div class="panel">
        <h3 class="panel-title">戰略自選群組 (即時數據連動) <span>LOCAL_STORAGE</span></h3>
        <div class="search-box">
            <input type="text" id="newGroupInput" placeholder="輸入新群組名稱 (例: AI_CORE)" onkeydown="if(event.key==='Enter') createNewGroup()">
            <button class="action-btn" style="background:transparent; color:var(--neon-blue); border:1px solid var(--neon-blue);" onclick="createNewGroup()">+ 建立群組</button>
        </div>
        <div id="watchlistsWrapper" class="watchlist-container"></div>
    </div>

</div>

<script>
    // 1. 初始化資料庫
    let allCalculatedStocks = []; 
    let seedStockList = [];       
    let activeWatchlists = JSON.parse(localStorage.getItem('quantumUSWatchlists')) || { "MY_WATCHLIST": [] };

    // 2. 核心載入邏輯
    async function loadTerminalData() {
        const sysStatus = document.getElementById('sysStatus');
        if (sysStatus) sysStatus.innerText = "SYS_STATUS: 載入資料中...";

        try {
            // 同步載入這三個關鍵檔案
            const [resCalc, resAll, resTop] = await Promise.all([
                fetch('./all_calculated_us.json?t=' + new Date().getTime()),
                fetch('./all_stocks.json?t=' + new Date().getTime()),
                fetch('./top20_us.json?t=' + new Date().getTime())
            ]);

            if (resCalc.ok) {
                allCalculatedStocks = await resCalc.json();
                populateObsDropdown(allCalculatedStocks);
            }
            if (resAll.ok) seedStockList = await resAll.json();
            if (resTop.ok) renderUSRadar(await resTop.json());

            renderWatchlists();
            updateSelectMenu();
            if (sysStatus) sysStatus.innerText = "SYS_STATUS: 連線成功 (OPERATIONAL)";
        } catch (e) {
            if (sysStatus) sysStatus.innerText = "SYS_STATUS: 資料讀取異常";
        }
    }

    // 3. 雷達渲染 (左側)
    function renderUSRadar(data) {
        const tbody = document.getElementById('usRadarBody');
        if (!tbody) return;
        tbody.innerHTML = data.map(r => `
            <tr>
                <td class="ticker-cell">${r['代號']}</td>
                <td>${r['名稱']}</td>
                <td>$${r['現價'].toFixed(2)}</td>
                <td style="color:${r['10D動能(%)'] >= 0 ? 'var(--trade-green)' : 'var(--trade-red)'}">${r['10D動能(%)']}%</td>
                <td class="score-cell">${r['妖股分數'].toFixed(1)}</td>
            </tr>
        `).join('');
    }

    // 4. 下拉選單 (右上)
    function populateObsDropdown(data) {
        const select = document.getElementById('obsDropdown');
        if (!select) return;
        // 為了避免卡頓，這裡只展示前 500 筆，完整的都在搜尋篩選裡
        select.innerHTML = '<option value="">-- 請選擇代號 --</option>' + 
            data.slice(0, 500).map(i => `<option value="${i['代號']}">${i['代號']} | ${i['名稱']}</option>`).join('');
    }

    function inspectTargetStock() {
        const select = document.getElementById('obsDropdown');
        const display = document.getElementById('obsDisplayGrid');
        if (!select || !display) return;
        
        const stock = allCalculatedStocks.find(item => item['代號'] === select.value);
        if (stock) {
            display.innerHTML = `
                <div>代號: <b>${stock['代號']}</b> | 現價: <b>$${stock['現價']}</b></div>
                <div>動能: ${stock['10D動能(%)']}% | 分數: ${stock['妖股分數']}</div>`;
        }
    }

    // 5. 檢索與自選 (右中/右下)
    function searchUSStocks() {
        const input = document.getElementById('usSearchInput').value.toUpperCase();
        const resultsDiv = document.getElementById('usSearchResults');
        if (!resultsDiv) return;
        
        const filtered = seedStockList.filter(s => s.Code.includes(input) || s.Name.toUpperCase().includes(input)).slice(0, 20);
        resultsDiv.innerHTML = filtered.map(s => `
            <div class="list-item">
                <span><b>${s.Code}</b> - ${s.Name.substring(0, 15)}</span>
                <button class="action-btn" onclick="addTickerToGroup('${s.Code}', '${s.Name.replace(/'/g, "\\'")}')">+ 加入</button>
            </div>
        `).join('');
    }

    function addTickerToGroup(code, name) {
        const groupName = document.getElementById('watchlistSelect').value || "MY_WATCHLIST";
        if (!activeWatchlists[groupName]) activeWatchlists[groupName] = [];
        if (!activeWatchlists[groupName].find(s => s.code === code)) {
            activeWatchlists[groupName].push({ code, name });
            localStorage.setItem('quantumUSWatchlists', JSON.stringify(activeWatchlists));
            renderWatchlists();
        }
    }

    function renderWatchlists() {
        const wrapper = document.getElementById('watchlistsWrapper');
        if (!wrapper) return;
        wrapper.innerHTML = Object.keys(activeWatchlists).map(group => `
            <div class="group-header">📂 ${group}</div>
            ${activeWatchlists[group].map(s => {
                const live = allCalculatedStocks.find(x => x['代號'] === s.code);
                return `<div class="list-item"><span>${s.code}</span><span>${live ? '$'+live['現價'] : '無報價'}</span></div>`;
            }).join('')}
        `).join('');
    }

    function updateSelectMenu() {
        const s = document.getElementById('watchlistSelect');
        if (s) s.innerHTML = Object.keys(activeWatchlists).map(g => `<option value="${g}">${g}</option>`).join('');
    }

    function createNewGroup() {
        const name = document.getElementById('newGroupInput').value.trim().toUpperCase();
        if (name && !activeWatchlists[name]) {
            activeWatchlists[name] = [];
            localStorage.setItem('quantumUSWatchlists', JSON.stringify(activeWatchlists));
            renderWatchlists();
            updateSelectMenu();
        }
    }

    function purgeGroup(name) { delete activeWatchlists[name]; localStorage.setItem('quantumUSWatchlists', JSON.stringify(activeWatchlists)); renderWatchlists(); updateSelectMenu(); }

    loadTerminalData();
</script>
</body>
</html>
